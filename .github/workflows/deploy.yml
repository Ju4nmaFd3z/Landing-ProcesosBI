name: Deploy a IONOS (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Si se solapan despliegues, cancela el anterior y deja solo el ultimo.
concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    name: Subir a IONOS por SFTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Preparar carpeta limpia (solo lo publicable)
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/
          cp favicon.svg dist/
          cp -R assets dist/
          # Eliminar cualquier .DS_Store que se hubiera colado
          find dist -name '.DS_Store' -delete
          echo "Contenido a publicar:"
          find dist -type f | sort

      - name: Desplegar por SFTP a IONOS (lftp + contrasena)
        env:
          SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          SFTP_PASS: ${{ secrets.IONOS_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT || '22' }}
          REMOTE_PATH: ${{ secrets.IONOS_REMOTE_PATH }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          # En IONOS, el login SFTP cae en el "home" del webspace, que ES el
          # document root del dominio. Una barra ABSOLUTA "/" sube a la raiz del
          # chroot (un nivel por encima) y NO se publica. Por eso, si el secret
          # es "/" o esta vacio, subimos al directorio de login (relativo ".").
          DEST="$REMOTE_PATH"
          if [ -z "$DEST" ] || [ "$DEST" = "/" ]; then DEST="."; fi
          echo "Destino remoto efectivo: $DEST"
          # mirror inverso (local -> remoto). --no-perms: IONOS no permite chmod
          # por SFTP. Sin --delete: no borra lo que ya hubiera en el destino.
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            set net:timeout 25;
            open -u '$SFTP_USER','$SFTP_PASS' -p $SFTP_PORT sftp://$SFTP_HOST;
            echo '===== DIAGNOSTICO: directorio de login =====';
            pwd;
            ls -la;
            mirror --reverse --verbose --no-perms ./dist/ '$DEST';
            echo '===== DIAGNOSTICO: contenido tras subir =====';
            ls -la '$DEST';
          "
