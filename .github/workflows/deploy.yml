name: Deploy a IONOS (SFTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Si se solapan despliegues, cancela el anterior y deja solo el ultimo.
concurrency:
  group: deploy-ionos
  cancel-in-progress: true

jobs:
  deploy:
    name: Subir a IONOS por SFTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Preparar carpeta limpia (solo lo publicable)
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/
          cp favicon.svg dist/
          cp -R assets dist/
          # Eliminar cualquier .DS_Store que se hubiera colado
          find dist -name '.DS_Store' -delete
          echo "Contenido a publicar:"
          find dist -type f | sort

      - name: Desplegar por SFTP a IONOS (lftp + contrasena)
        env:
          SFTP_HOST: ${{ secrets.IONOS_SFTP_HOST }}
          SFTP_USER: ${{ secrets.IONOS_SFTP_USER }}
          SFTP_PASS: ${{ secrets.IONOS_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.IONOS_SFTP_PORT || '22' }}
          REMOTE_PATH: ${{ secrets.IONOS_REMOTE_PATH }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          CONN="set sftp:auto-confirm yes; set net:max-retries 2; set net:timeout 25; open -u '$SFTP_USER','$SFTP_PASS' -p $SFTP_PORT sftp://$SFTP_HOST;"

          # ── localizar el document root ────────────────────────────────
          # IONOS sirve una carpeta "defaultsite" DENTRO del webroot del
          # dominio. Buscandola, su carpeta padre ES el document root. Asi no
          # dependemos de adivinar la ruta (login != docroot en este webspace).
          echo "===== Arbol del webspace ====="
          TREE=$(lftp -c "$CONN find -d 5 /;")
          echo "$TREE"
          DOCDIR=$(echo "$TREE" | sed 's#/\$##' | grep -iE '/defaultsite$' | head -1)

          if [ -n "$DOCDIR" ]; then
            DEST=$(dirname "$DOCDIR")
            echo ">>> Document root detectado por 'defaultsite': $DEST"
          else
            # fallback: el secret REMOTE_PATH ('/' o vacio -> login dir '.')
            DEST="$REMOTE_PATH"
            if [ -z "$DEST" ] || [ "$DEST" = "/" ]; then DEST="."; fi
            echo ">>> No se encontro 'defaultsite'; uso REMOTE_PATH: $DEST"
          fi

          # ── subir ─────────────────────────────────────────────────────
          # --no-perms: IONOS no permite chmod por SFTP. Sin --delete: no borra
          # lo que ya hubiera (incluida la 'defaultsite', que deja de servirse
          # en cuanto nuestro index.html ocupa el docroot).
          lftp -c "$CONN mirror --reverse --verbose --no-perms ./dist/ '$DEST/';"
          echo "===== Contenido del document root tras subir ====="
          lftp -c "$CONN cls -la '$DEST/';"
